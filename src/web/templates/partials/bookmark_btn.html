<button class="bookmark-btn {% if bookmarked %}bookmarked{% endif %}"
        hx-post="/emails/{{ email_id }}/bookmark"
        hx-target="this"
        hx-swap="outerHTML"
        title="{% if bookmarked %}Retirer des favoris{% else %}Ajouter aux favoris{% endif %}">
  {% if bookmarked %}⭐{% else %}☆{% endif %}
</button>
