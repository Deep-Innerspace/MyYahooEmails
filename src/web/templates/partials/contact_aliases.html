{% for alias in contact.aliases %}
<div style="display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1) 0" class="alias-row">
  <span class="badge badge-secondary" style="font-size:var(--font-size-xs);font-weight:400">{{ alias }}</span>
  <form hx-post="/contacts/{{ contact.id }}/aliases/remove"
        hx-target="#aliases-section"
        hx-swap="innerHTML"
        style="display:inline">
    <input type="hidden" name="alias_email" value="{{ alias }}">
    <button type="submit" class="btn btn-danger btn-sm" style="padding:2px 6px;font-size:10px"
            title="Remove alias">×</button>
  </form>
</div>
{% else %}
<span class="text-xs text-muted">No aliases</span>
{% endfor %}
